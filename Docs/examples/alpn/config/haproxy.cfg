global
    log stdout format raw local0
    maxconn 4096

defaults
    log global
    mode tcp
    option tcplog
    timeout connect 10s
    timeout client 30s
    timeout server 30s

frontend stats
    mode http
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s

# Option 1: TLS termination at HAProxy, plain connection to Mosquitto
# Uncomment this section and comment out Option 2 to use
#
# frontend mqtt_tls
#     bind *:443 ssl crt /etc/ssl/certs/server.pem alpn mqtt
#     mode tcp
#     acl alpn_mqtt ssl_fc_alpn -i mqtt
#     tcp-request session reject unless alpn_mqtt
#     default_backend mqtt_plain
#
# backend mqtt_plain
#     mode tcp
#     server mosquitto mosquitto:1883 check

# Option 2: TLS termination at HAProxy, re-encrypt to Mosquitto (end-to-end TLS)
# Both HAProxy and Mosquitto use the same certificates

frontend mqtt_tls
    bind *:443 ssl crt /etc/ssl/certs/server.pem alpn mqtt
    mode tcp

    # Log ALPN protocol
    log-format "%ci:%cp [%t] %ft %b/%s %Tw/%Tc/%Tt %B %ts %ac/%fc/%bc/%sc/%rc %sq/%bq ssl_alpn:%[ssl_fc_alpn]"

    # Reject connections without correct ALPN
    acl alpn_mqtt ssl_fc_alpn -i mqtt
    tcp-request session reject unless alpn_mqtt

    default_backend mqtt_tls_backend

backend mqtt_tls_backend
    mode tcp
    # Re-encrypt connection to Mosquitto using same CA
    # Note: Health checks disabled to avoid TLS handshake noise in logs
    server mosquitto mosquitto:8883 ssl ca-file /etc/ssl/certs/ca.crt verify required
