global
    log stdout format raw local0
    maxconn 4096

defaults
    log global
    mode tcp
    option tcplog
    timeout connect 10s
    timeout client 30s
    timeout server 30s

frontend stats
    mode http
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s

frontend mqtt_tls
    bind *:443 ssl crt /etc/ssl/certs/server.pem alpn mqtt
    mode tcp

    # Log ALPN protocol for debugging
    log-format "%ci:%cp [%t] %ft %b/%s %Tw/%Tc/%Tt %B %ts %ac/%fc/%bc/%sc/%rc %sq/%bq ssl_alpn:%[ssl_fc_alpn]"

    # Reject connections without correct ALPN
    acl alpn_mqtt ssl_fc_alpn -i mqtt
    tcp-request session reject unless alpn_mqtt

    default_backend mqtt_backend

backend mqtt_backend
    mode tcp
    server mosquitto mosquitto:1883 check
