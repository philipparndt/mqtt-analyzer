apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: mqtt-ingressroute
  namespace: mqtt
spec:
  entryPoints:
    - websecure
  routes:
    - match: HostSNI(`mqtt.local.rnd7.de`)
      services:
        - name: hivemq
          port: 8883
  tls:
    passthrough: true
---
# mTLS endpoint - requires client certificate
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: mqtt-mtls-ingressroute
  namespace: mqtt
spec:
  entryPoints:
    - websecure
  routes:
    - match: HostSNI(`mtls.local.rnd7.de`) || HostSNI(`test.mqtt.rnd7.de`)
      services:
        - name: hivemq
          port: 8884
  tls:
    passthrough: true
